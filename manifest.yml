app:
  id: ari:cloud:ecosystem::app/16f5ff69-5686-4ac9-a89e-47ba12f0ef7c
  connect:
    key: com.not-atlassian.connect.better-code-macro.prod
    remote: connect
remotes:
  - key: connect
    baseUrl: https://cloud-code-macro.services.atlassian.com
connectModules:
  confluence:dynamicContentMacros:
    - key: bitbucket-snippet-code-macro
      name:
        value: Bitbucket snippet macro
      url: /macro/bitbucket-snippet-code-macro?snippetUrl={snippetUrl}
      icon:
        width: 80
        height: 80
        url: /static/images/bitbucket/bitbucket-logo-80px.png
      documentation:
        url: /docs/bitbucket-snippets
      categories:
        - development
        - external-content
      outputType: block
      bodyType: none
      aliases:
        - snippet
        - bbsnippet
        - bitbucket
      featured: false
      parameters:
        - identifier: snippetUrl
          name:
            value: Snippet url
          type: string
          required: true
          multiple: false
          hidden: true
      autoconvert:
        urlParameter: snippetUrl
        matchers:
          - pattern: https://bitbucket.org/snippets/{}/{}
          - pattern: https://bitbucket.org/snippets/{}/{}/{}
      hidden: true
    - key: gist-code-macro
      name:
        value: GitHub gist macro
      url: /macro/gist-code-macro?gistUrl={gistUrl}
      icon:
        width: 80
        height: 80
        url: /static/images/github/GitHub-Mark-80px.png
      documentation:
        url: /docs/gist-code-macro
      categories:
        - development
        - external-content
      outputType: block
      bodyType: none
      aliases:
        - gist
      featured: false
      parameters:
        - identifier: gistUrl
          name:
            value: Gist url
          type: string
          required: true
          multiple: false
          hidden: true
      autoconvert:
        urlParameter: gistUrl
        matchers:
          - pattern: https://gist.github.com/{}/{}
      hidden: true
    - key: paste-code-macro
      name:
        value: Better Code Block
      url: >-
        /macro/paste-code-macro?page_id={page.id}&macro_id={macro.id}&page_version={page.version}&output_type={output.type}&theme={theme}&language={language}&title={title}
      description:
        value: Better macro to format blocks of source code or markup.
      icon:
        width: 80
        height: 80
        url: /static/images/cloud-code-macro-paste-icon.png
      documentation:
        url: /docs/paste-code-macro
      categories:
        - development
        - formatting
      outputType: block
      bodyType: plain-text
      aliases:
        - bettercode
        - codebetter
        - bcode
      featured: true
      parameters:
