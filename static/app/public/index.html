<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud Code Macro</title>
    <style>
      html, body {
        /* Use Atlassian Design System color tokens for theme-aware backgrounds */
        background-color: var(--ds-surface, #ffffff);
        color: var(--ds-text, #172b4d);
        margin: 0;
        padding: 0;
      }

      #root {
        background-color: var(--ds-surface, #ffffff);
      }

      /* Dark theme fallback if CSS vars not available */
      @media (prefers-color-scheme: dark) {
        html, body, #root {
          background-color: var(--ds-surface, #1d2125);
          color: var(--ds-text, #b3d4ff);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
